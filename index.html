<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Smart Form Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Poppins',sans-serif}

body{
background:linear-gradient(135deg,#4facfe,#00f2fe);
min-height:100vh;
padding:30px;
display:flex;
justify-content:center;
}

.container{
width:100%;
max-width:1100px;
background:white;
padding:30px;
border-radius:16px;
box-shadow:0 20px 50px rgba(0,0,0,0.15);
animation:fadeIn .7s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(25px)}
to{opacity:1;transform:translateY(0)}
}

h1{
text-align:center;
margin-bottom:25px;
color:#3b4cff;
}

h2{
margin-bottom:15px;
color:#333;
}

.dashboard{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
gap:18px;
margin-bottom:30px;
}

.card{
background:linear-gradient(135deg,#667eea,#764ba2);
color:white;
padding:22px;
border-radius:12px;
text-align:center;
font-weight:500;
cursor:pointer;
transition:.3s;
}

.card:hover{
transform:translateY(-6px) scale(1.05);
box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

.builder{display:none;animation:fadeIn .5s ease}

label{font-size:14px;font-weight:500}

input,textarea,select{
width:100%;
padding:9px;
border-radius:6px;
border:1px solid #ccc;
margin-top:6px;
margin-bottom:14px;
}

.field-buttons{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:10px;
margin-bottom:20px;
}

button{
padding:9px 14px;
border:none;
border-radius:8px;
background:#3b4cff;
color:white;
cursor:pointer;
transition:.25s;
font-size:13px;
}

button:hover{
background:#2c38d1;
transform:scale(1.05);
}

.delete-btn{background:#ff4d4d}
.delete-btn:hover{background:#e63939}

.form-preview{
margin-top:20px;
padding:20px;
border:2px dashed #ddd;
border-radius:10px;
}

.field-box{
padding:12px;
border:1px solid #eee;
border-radius:8px;
margin-bottom:10px;
background:#fafafa;
}

.field-actions{
margin-top:6px;
display:flex;
gap:6px;
}

.share{
display:none;
margin-top:25px;
background:#f4f7ff;
padding:15px;
border-radius:10px;
}

.link-box{display:flex;gap:10px;margin-top:10px}

.copy{background:#28c76f}

.copy:hover{background:#1ea85a}

</style>
</head>

<body>

<div class="container">

<h1>Smart Form Builder</h1>

<div class="dashboard">
<div class="card" onclick="openBuilder('Survey Form')">Survey Form</div>
<div class="card" onclick="openBuilder('Registration Form')">Registration Form</div>
<div class="card" onclick="openBuilder('Feedback Form')">Feedback Form</div>
<div class="card" onclick="openBuilder('Application Form')">Application Form</div>
<div class="card" onclick="openBuilder('Quiz Form')">Quiz Form</div>
<div class="card" onclick="openBuilder('Contact Form')">Contact Form</div>
</div>

<div class="builder" id="builder">

<h2 id="formType"></h2>

<label>Form Title</label>
<input type="text" placeholder="Enter form title">

<label>Description</label>
<textarea placeholder="Enter description"></textarea>

<h3>Add Fields</h3>

<div class="field-buttons">
<button onclick="addField('text','Name')">Name</button>
<button onclick="addField('number','Age')">Age</button>
<button onclick="addField('radio','Gender')">Gender</button>
<button onclick="addField('text','College Name')">College Name</button>
<button onclick="addField('text','Branch')">Branch</button>
<button onclick="addField('email','Email')">Email</button>
<button onclick="addField('text','Address')">Address</button>
<button onclick="addField('tel','Contact Number')">Contact Number</button>
<button onclick="addField('date','Date')">Date</button>
<button onclick="addField('time','Time')">Time</button>
</div>

<div class="form-preview" id="formPreview">
<b>Form Preview</b>
</div>

<button onclick="publishForm()">Publish Form</button>

<div class="share" id="shareBox">
<b>Form Created Successfully</b>
<p>Share your form link:</p>

<div class="link-box">
<input id="formLink" value="https://smartform.app/form/12345" readonly>
<button class="copy" onclick="copyLink()">Copy</button>
</div>
</div>

</div>
</div>

<script>

function openBuilder(type){
 document.getElementById('builder').style.display='block'
 document.getElementById('formType').innerText=type
 window.scrollTo({top:500,behavior:'smooth'})
}

function addField(type,label){

const preview=document.getElementById('formPreview')

const field=document.createElement('div')
field.className='field-box'

let inputHTML=""

if(type==='textarea'){
 inputHTML='<textarea placeholder="Long answer"></textarea>'
}

else if(type==='radio'){
 inputHTML='( ) Option 1<br>( ) Option 2'
}

else if(type==='checkbox'){
 inputHTML='[ ] Option 1<br>[ ] Option 2'
}

else if(type==='dropdown'){
 inputHTML='<select><option>Option 1</option><option>Option 2</option></select>'
}

else if(type==='scale'){
 inputHTML='1 2 3 4 5'
}

else{
 inputHTML=`<input type="${type}" placeholder="${label}">`
}

field.innerHTML=`
<label contenteditable="true">${label}</label>
${inputHTML}
<div class="field-actions">
<button onclick="editField(this)">Edit</button>
<button class="delete-btn" onclick="deleteField(this)">Delete</button>
</div>
`

preview.appendChild(field)

}

function deleteField(btn){
btn.closest('.field-box').remove()
}

function editField(btn){

const field=btn.closest('.field-box')
const label=field.querySelector('label')

const newName=prompt('Edit field name:',label.innerText)

if(newName && newName.trim()!==''){
 label.innerText=newName
}

}

async function publishForm(){

const title = document.querySelector("input").value
const description = document.querySelector("textarea").value

const fields = []

document.querySelectorAll(".field-box label").forEach(field=>{
fields.push(field.innerText)
})

const formData = {
title:title,
description:description,
fields:fields
}

const response = await fetch("/create-form",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(formData)
})

const result = await response.json()

document.getElementById("formLink").value=result.link

document.getElementById("shareBox").style.display="block"

}

function copyLink(){
 const link=document.getElementById('formLink')
 link.select()
 document.execCommand('copy')
 alert('Link copied!')
}

</script>

</body>
</html>
