<!DOCTYPE html>
<html>
<head>
<title>Fill Form</title>

<style>

body{
font-family:Arial;
background:#f4f6ff;
padding:40px;
}

.container{
max-width:600px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h2{
color:#3b4cff;
margin-bottom:10px;
}

input,textarea{
width:100%;
padding:10px;
margin:8px 0 15px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#3b4cff;
color:white;
border:none;
padding:10px 16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#2b36cc;
}

</style>

</head>

<body>

<div class="container">

<h2 id="title"></h2>
<p id="description"></p>

<form id="formFields"></form>

<button onclick="submitForm()">Submit</button>

</div>

<script>

const urlParams = new URLSearchParams(window.location.search)
const formId = urlParams.get("id")

async function loadForm(){

const res = await fetch("/get-form/"+formId)
const form = await res.json()

document.getElementById("title").innerText = form.title
document.getElementById("description").innerText = form.description

const container = document.getElementById("formFields")

form.fields.forEach(field => {

const div = document.createElement("div")

div.innerHTML = `
<label>${field}</label>
<input type="text" name="${field}">
`

container.appendChild(div)

})

}

async function submitForm(){

const inputs = document.querySelectorAll("#formFields input")

const responseData = {}

inputs.forEach(input=>{
responseData[input.name] = input.value
})

await fetch("/submit/"+formId,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(responseData)

})

alert("Form submitted successfully")

}

loadForm()

</script>

</body>
</html>
